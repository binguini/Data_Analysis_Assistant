server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: text2sql-assistant
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/text2sql_meta?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: text2sql
    password: text2sql123
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

text2sql:
  llm:
    provider: deepseek
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
    timeout-seconds: 30
    mock-enabled: ${LLM_MOCK_ENABLED:true}
  query:
    max-rows: 1000
    timeout-seconds: 15
  security:
    enable-sql-parser: true
    block-sensitive-fields: true
